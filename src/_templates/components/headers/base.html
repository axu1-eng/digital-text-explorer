<header class="bg-neutral-dark py-18 shadow-lg">
  <div class="container px-5 mx-auto">
    <div class="flex md:flex-nowrap flex-wrap gap-12 w-full items-start min-h-24 justify-between">
      <div class="basis-full md:basis-1/3">
        <p data-i18n="{{ section }}" class="text-xs text-accent-light tracking-widest font-medium title-font mb-1 uppercase">{{ section }}</p>
        <h1 data-i18n="{{ title }}" class="sm:text-4xl text-2xl font-bold title-font mb-2 text-text-dark">{{ title }}</h1>
        <div class="h-1 w-20 bg-accent-light rounded mt-4"></div>
      </div>
      <div class="basis-full md:basis-2/3">
        <p data-i18n="{{ description }}" class="font-light sm:text-2xl text-xl text-text-light mb-2 max-w-[50ch]">{{ description }}</p>
      </div>
    </div>
  </div>
</header>
