<script src="https://unpkg.com/itemsjs@2.1.24/dist/index.umd.js"></script>
<script src="https://unpkg.com/lunr/lunr.js"></script>
<script>
  async function fetchData(dataFile) {
    const response = await fetch(dataFile);
    const data = await response.json();
    return data;
  }
</script>

<!-- Embed searchConfig as JSON to avoid Markdown/html reflow issues -->
<script id="search-config" type="application/json">{{ config.search | jsonify }}</script>

<script>
  window.prefixUrl    = "{{ '/' | url }}";
  window.promisedData = fetchData("{{ '/api/documents.json' | url }}");
</script>

<div class="w-full mb-12 align-middle">
  <div class="join relative mt-2 flex justify-between items-center w-full shadow rounded-md bg-[#f8f4ea]">

    <select id="search-limit-select" class="flex-none min-w-[150px] w-fit z-10 px-2 active:border-transparent focus:border-transparent focus:ring-0 focus:outline-none bg-transparent border-none cursor-pointer">
      <option disabled>Search Within</option>
      {%- for field in config.search.searchFields -%}
        <option>{{ field }}</option>
      {%- endfor -%}
    </select>

    <div class="ml-4 border-r h-10"></div>

    <div class="grow ml-2">
      <input
        id="search-input"
        type="text"
        class="w-full p-2 transition duration-300 ease focus:outline-none font-mono"
        placeholder="Search"
      />
    </div>

    <div class="border-r h-10"></div>

    <button id="search-submit" class="focus:outline-none flex-none cursor-pointer py-1.5 px-2 hover:text-black" type="button">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="w-4 h-4">
        <path fill-rule="evenodd" d="M9.965 11.026a5 5 0 1 1 1.06-1.06l2.755 2.754a.75.75 0 1 1-1.06 1.06l-2.755-2.754ZM10.5 7a3.5 3.5 0 1 1-7 0 3.5 3.5 0 0 1 7 0Z" clip-rule="evenodd"/>
      </svg>
    </button> 
  </div>   
</div>
