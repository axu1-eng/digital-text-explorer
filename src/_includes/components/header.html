<header class="bg-neutral-dark py-18 shadow-lg">
  <div class="container px-5 mx-auto">
    <div class="flex md:flex-nowrap flex-wrap gap-12 w-full items-baseline-last min-h-24 justify-between">
      <div class="basis-full md:basis-1/3">
        <h3 class="text-xs text-accent-light tracking-widest font-medium title-font mb-1 uppercase">{{ section }}</h3>
        <h1 class="sm:text-4xl text-2xl font-bold title-font mb-2 text-text-dark">{{ title }}</h1>
        <div class="h-1 w-20 bg-accent-light rounded mt-4"></div>
      </div>
      <div class="basis-full md:basis-2/3">
        <p class="leading-relaxed text-text-light mb-2">{{ description }}</p>
      </div>
    </div>
  </div>
</header>
