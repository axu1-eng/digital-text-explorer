---
layout: "base"
---
  {% include "components/header.html" %}

  <div class="xl:container px-5 pb-24 pt-12 mx-auto">
    <div class="flex flex-wrap -m-4">
      {% for card in cards %}
      <div class="xl:w-1/4 md:w-1/3 sm:w-1/2 p-4">
        <a href="{{ card.link }}">
          <div class="transition duration-250 ease-in-out hover:scale-105">
            <img class="h-40 rounded w-full object-cover object-center mb-6" src="{{ card.img | default: 'https://dummyimage.com/720x400 '}}" alt="content">
            <h3 class="uppercase tracking-widest text-accent-light text-xs font-medium title-font">{{ card.eyebrow }}</h3>
            <h2 class="text-xl text-text-dark font-bold my-2 leading-tight">{{ card.label }}</h2>
          </div>
        </a>
      </div>
      {% endfor %}
    </div>
  </div>
